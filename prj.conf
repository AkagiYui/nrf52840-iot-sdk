# Enable GPIO driver (required for LED control)
CONFIG_GPIO=y

# Enable printk and console output
CONFIG_PRINTK=y
CONFIG_CONSOLE=y
CONFIG_SERIAL=y

# BLE 协议栈
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="RGB LED BLE Demo"
CONFIG_BT_DEVICE_APPEARANCE=0
CONFIG_BT_MAX_CONN=1

# GATT 服务
CONFIG_BT_GATT_CLIENT=n

# 广播
CONFIG_BT_EXT_ADV=n
